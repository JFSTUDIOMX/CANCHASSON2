<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retas Cajeme | JFSTUDIOMX</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #fb8c00; 
            --secondary: #2e7d32;
            --dark: #121212;
            --google-blue: #4285F4;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            color: var(--dark);
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1544919982-b61976f0ba43?auto=format&fit=crop&w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 4rem 1rem;
            border-bottom: 6px solid var(--primary);
        }

        header h1 { font-family: 'Black Han Sans', sans-serif; font-size: clamp(2rem, 8vw, 3.5rem); margin: 0; }

        /* --- SECCIÓN DE RETAS --- */
        .retas-banner {
            background: var(--dark);
            color: white;
            padding: 30px;
            text-align: center;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 20px;
            border-left: 10px solid var(--primary);
        }

        .reta-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        /* Ocultar botones de admin por defecto */
        .admin-only { display: none; }

        .btn-add-reta { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-clear-reta { background: #ff5252; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* --- FILTROS --- */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .filter-btn { padding: 10px 20px; border: 2px solid #ddd; border-radius: 50px; cursor: pointer; font-weight: bold; background: white; }
        .filter-btn.active { background: var(--dark); color: white; }

        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }

        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card-img { height: 150px; background-size: cover; background-position: center; }
        .card-content { padding: 15px; }

        /* --- COMENTARIOS --- */
        .comments-section { background: #f9f9f9; padding: 15px; border-top: 1px solid #eee; max-height: 200px; overflow-y: auto; }
        .comment { font-size: 0.85rem; background: white; padding: 8px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #ddd; position: relative; }

        .btn-delete { position: absolute; right: 5px; top: 5px; background: none; border: none; color: #ff5252; cursor: pointer; font-size: 0.7rem; }

        .comment-input { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 5px; box-sizing: border-box; }
        .btn-post { background: var(--dark); color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; width: 100%; }

        footer { text-align: center; padding: 40px; background: var(--dark); color: white; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>RETAS <span>CAJEME</span></h1>
        <p>Esperanza • Alameda • Villa Bonita</p>
    </header>

    <div class="retas-banner">
        <h2>🏀 SECCIÓN DE RETAS</h2>
        <p id="reta-info">No hay retas activas reportadas.</p>
        
         <div class="reta-controls">
            <button class="btn-add-reta admin-only" onclick="addReta()">+ AGREGAR RETA</button>
            <button class="btn-clear-reta admin-only" onclick="clearReta()">✖ BORRAR RETA</button>
        </div>
    </div>

    <div class="filter-container">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="ESPERANZA">Esperanza</button>
        <button class="filter-btn" data-filter="ALAMEDA">Alameda</button>
        <button class="filter-btn" data-filter="VILLA BONITA">Villa Bonita</button>
    </div>

    <main id="courts-grid" class="grid"></main>

    <footer>
        <p>Aquí no hay excusas, solo hay canchas. 🏟️</p>
        <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 10px;">
            © 2026 JFSTUDIOMX | Todos los derechos reservados.
        </div>
    </footer>

    <script>
        const PASS = "Rodillas123";

        // VERIFICAR SI ERES EL ADMIN (JFSTUDIOMX)
        function checkAdmin() {
            if (localStorage.getItem('jf_admin_key') === 'true') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-block');
                return true;
            }
            return false;
        }

        const canchas = [
            { id: 1, nombre: "Plaza Esperanza", sector: "ESPERANZA", coords: "27.581260,-109.929499", img: "https://images.unsplash.com/photo-1544919982-b61976f0ba43?auto=format&fit=crop&w=600" },
            { id: 2, nombre: "Canchas Nueva Esperanza", sector: "ESPERANZA", coords: "27.581260,-109.929499", img: "https://images.unsplash.com/photo-1504450758481-7338eba7524a?auto=format&fit=crop&w=600" },
            { id: 3, nombre: "Cancha Plaza del Músico", sector: "ESPERANZA", coords: "27.578645,-109.938820", img: "https://images.unsplash.com/photo-1519861531473-9200362f46b3?auto=format&fit=crop&w=600" },
            { id: 4, nombre: "Canchas Grope", sector: "ALAMEDA", coords: "27.576474,-109.946508", img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=600" },
            { id: 5, nombre: "Canchas Poncho", sector: "ALAMEDA", coords: "27.571568,-109.946257", img: "https://images.unsplash.com/photo-1466193341027-56e68017ee2d?auto=format&fit=crop&w=600" },
            { id: 6, nombre: "Cancha Lunin", sector: "ALAMEDA", coords: "27.572059,-109.944338", img: "https://images.unsplash.com/photo-1511886929837-354d827aae26?auto=format&fit=crop&w=600" },
            { id: 7, nombre: "LA BOMBERA", sector: "VILLA BONITA", coords: "27.567762,-109.941760", img: "https://images.unsplash.com/photo-1551958219-acbc608c6377?auto=format&fit=crop&w=600" },
            { id: 8, nombre: "Canchas Pergon", sector: "VILLA BONITA", coords: "27.561950,-109.944967", img: "https://images.unsplash.com/photo-1529900948638-02f04dc58297?auto=format&fit=crop&w=600" },
            { id: 9, nombre: "Canchas La Paz", sector: "VILLA BONITA", coords: "27.561238,-109.940226", img: "https://images.unsplash.com/photo-1542652694-40abf526446e?auto=format&fit=crop&w=600" }
        ];

        function addReta() {
            if (!checkAdmin()) return;
            const text = prompt("¿Qué reta se armará?");
            if (text) {
                localStorage.setItem('reta_activa', text);
                document.getElementById('reta-info').innerText = "🔥 " + text;
            }
        }

        function clearReta() {
            if (!checkAdmin()) return;
            localStorage.removeItem('reta_activa');
            document.getElementById('reta-info').innerText = "No hay retas activas reportadas.";
        }

        function postComment(canchaId) {
            const input = document.getElementById(`input-${canchaId}`);
            if (!input.value) return;
            let comments = JSON.parse(localStorage.getItem(`comments-${canchaId}`)) || [];
            comments.push({ id: Date.now(), text: input.value });
            localStorage.setItem(`comments-${canchaId}`, JSON.stringify(comments));
            input.value = '';
            render();
        }

        function deleteComment(canchaId, commentId) {
            if (!checkAdmin()) {
                alert("Solo JFSTUDIOMX puede borrar comentarios.");
                return;
            }
            let comments = JSON.parse(localStorage.getItem(`comments-${canchaId}`));
            comments = comments.filter(c => c.id !== commentId);
            localStorage.setItem(`comments-${canchaId}`, JSON.stringify(comments));
            render();
        }

        function render(filter = 'all') {
            const grid = document.getElementById('courts-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? canchas : canchas.filter(c => c.sector === filter);
            const isAdmin = localStorage.getItem('jf_admin_key') === 'true';

            filtered.forEach(c => {
                let commsHTML = '';
                const storedComms = JSON.parse(localStorage.getItem(`comments-${c.id}`)) || [];
                storedComms.forEach(com => {
                    commsHTML += `
                        <div class="comment">
                            ${com.text}
                            ${isAdmin ? `<button class="btn-delete" onclick="deleteComment(${c.id}, ${com.id})">✖</button>` : ''}
                        </div>`;
                });

                grid.innerHTML += `
                    <div class="card">
                        <div class="card-img" style="background-image: url('${c.img}')"></div>
                        <div class="card-content">
                            <div class="zona-tag">📍 ${c.sector}</div>
                            <h3>${c.nombre}</h3>
                            <a href="https://www.google.com/maps/search/?api=1&query=${c.coords}" target="_blank" class="btn-post" style="text-align:center; text-decoration:none; display:block; margin-bottom:10px; background:#4285F4;">VER MAPA</a>
                            <input type="text" id="input-${c.id}" class="comment-input" placeholder="Aviso rápido...">
                            <button class="btn-post" onclick="postComment(${c.id})">PUBLICAR</button>
                        </div>
                        <div class="comments-section">
                            <strong>Avisos:</strong>
                            ${commsHTML}
                        </div>
                    </div>
                `;
            });
            checkAdmin();
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                e.target.classList.add('active');
                render(e.target.dataset.filter);
            });
        });

        // Al iniciar, cargar reta y verificar admin
        if(localStorage.getItem('reta_activa')) {
            document.getElementById('reta-info').innerText = "🔥 " + localStorage.getItem('reta_activa');
        }
        render();
    </script>
</body>
</html>
