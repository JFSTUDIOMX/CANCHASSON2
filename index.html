<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retas Cajeme | JFSTUDIOMX</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --primary: #fb8c00; 
            --secondary: #2e7d32;
            --dark: #121212;
            --google-blue: #4285F4;
            --jf-beige: #D9C9B4; /* Color beige de tu logo */
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            color: var(--dark);
            overflow-x: hidden;
            /* Espacio abajo para que el logo no tape el footer */
            padding-bottom: 100px; 
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1544919982-b61976f0ba43?auto=format&fit=crop&w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 4rem 1rem;
            border-bottom: 6px solid var(--primary);
        }

        header h1 { font-family: 'Black Han Sans', sans-serif; font-size: clamp(2rem, 8vw, 3.5rem); margin: 0; }

        /* --- SECCIÓN DE RETAS --- */
        .retas-banner {
            background: var(--dark);
            color: white;
            padding: 30px;
            text-align: center;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 20px;
            border-left: 10px solid var(--primary);
        }

        /* --- ESTILOS DEL MAPA --- */
        #map-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        #map {
            height: 400px;
            width: 100%;
            border-radius: 20px;
            border: 4px solid var(--dark);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 1;
        }

        /* --- FILTROS --- */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .filter-btn { padding: 10px 20px; border: 2px solid #ddd; border-radius: 50px; cursor: pointer; font-weight: bold; background: white; }
        .filter-btn.active { background: var(--dark); color: white; }

        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }

        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card-img { height: 150px; background-size: cover; background-position: center; }
        .card-content { padding: 15px; }

        /* --- SECCIÓN DE AVISOS --- */
        .comments-section { background: #f9f9f9; padding: 15px; border-top: 1px solid #eee; }
        .comment { font-size: 0.85rem; background: white; padding: 8px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #ddd; color: #555; }

        .btn-maps { 
            background: var(--google-blue); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            width: 100%; 
            display: block; 
            text-align: center; 
            text-decoration: none; 
            font-weight: bold;
        }

        footer { text-align: center; padding: 40px; background: var(--dark); color: white; margin-top: 50px; }

        /* --- ESTILOS DEL LOGO JFSTUDIOMX (NUEVO) --- */
        #jf-logo-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000; /* Super alto para que siempre se vea */
            width: 80px;
            height: 80px;
            opacity: 0.7; /* Ligeramente transparente */
            transition: all 0.3s ease;
        }

        #jf-logo-container:hover {
            opacity: 1;
            transform: scale(1.1) rotate(5deg);
        }

        #jf-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%; /* Como tu logo es circular */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Efecto de pulso si hay reta activa */
        .pulso-reta {
            animation: pulso 2s infinite;
        }

        @keyframes pulso {
            0% { box-shadow: 0 0 0 0 rgba(251, 140, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(251, 140, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 140, 0, 0); }
        }

    </style>
</head>
<body>

    <header>
        <h1>RETAS <span>CAJEME</span></h1>
        <p>Esperanza • Alameda • Villa Bonita</p>
    </header>

    <div class="retas-banner">
        <h2>🏀 RETA ACTIVA</h2>
        <p id="reta-info" style="font-size: 1.2rem;">
            🔥 ¡RETA CONFIRMADA! <br> 
            📅 Martes 10 de Marzo | 🕒 4:30 PM <br>
            📍 Plaza de Esperanza
        </p>
    </div>

    <div id="map-container">
        <h2 style="text-align: center; font-family: 'Black Han Sans';">📍 UBICACIÓN DE CANCHAS</h2>
        <div id="map"></div>
    </div>

    <div class="filter-container">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="ESPERANZA">Esperanza</button>
        <button class="filter-btn" data-filter="ALAMEDA">Alameda</button>
        <button class="filter-btn" data-filter="VILLA BONITA">Villa Bonita</button>
    </div>

    <main id="courts-grid" class="grid"></main>

    <footer>
        <p>Aquí no hay excusas, solo hay canchas. 🏟️</p>
        <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 10px;">
            © 2026 JFSTUDIOMX | Todos los derechos reservados.
        </div>
    </footer>

    <div id="jf-logo-container" class="pulso-reta">
        <img id="jf-logo-img" src="3.png" alt="Logo JFSTUDIOMX">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // LISTA DE CANCHAS
        const canchas = [
            { id: 1, nombre: "Plaza Esperanza", sector: "ESPERANZA", coords: "27.581260,-109.929499", img: "https://images.unsplash.com/photo-1544919982-b61976f0ba43?auto=format&fit=crop&w=600", avisos: ["Cancha abierta", "Luz disponible hasta las 10 PM"] },
            { id: 2, nombre: "Canchas Nueva Esperanza", sector: "ESPERANZA", coords: "27.581260,-109.929499", img: "https://images.unsplash.com/photo-1504450758481-7338eba7524a?auto=format&fit=crop&w=600", avisos: ["Traer balón propio"] },
            { id: 3, nombre: "Cancha Plaza del Músico", sector: "ESPERANZA", coords: "27.578645,-109.938820", img: "https://images.unsplash.com/photo-1519861531473-9200362f46b3?auto=format&fit=crop&w=600", avisos: [] },
            { id: 4, nombre: "Canchas Grope", sector: "ALAMEDA", coords: "27.576474,-109.946508", img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=600", avisos: ["Suele llenarse los viernes"] },
            { id: 5, nombre: "Canchas Poncho", sector: "ALAMEDA", coords: "27.571568,-109.946257", img: "https://images.unsplash.com/photo-1466193341027-56e68017ee2d?auto=format&fit=crop&w=600", avisos: [] },
            { id: 6, nombre: "Cancha Lunin", sector: "ALAMEDA", coords: "27.572059,-109.944338", img: "https://images.unsplash.com/photo-1511886929837-354d827aae26?auto=format&fit=crop&w=600", avisos: [] },
            { id: 7, nombre: "LA BOMBERA", sector: "VILLA BONITA", coords: "27.567762,-109.941760", img: "https://images.unsplash.com/photo-1551958219-acbc608c6377?auto=format&fit=crop&w=600", avisos: ["¡Cuidado con el calor!"] },
            { id: 8, nombre: "Canchas Pergon", sector: "VILLA BONITA", coords: "27.561950,-109.944967", img: "https://images.unsplash.com/photo-1529900948638-02f04dc58297?auto=format&fit=crop&w=600", avisos: [] },
            { id: 9, nombre: "Canchas La Paz", sector: "VILLA BONITA", coords: "27.561238,-109.940226", img: "https://images.unsplash.com/photo-1542652694-40abf526446e?auto=format&fit=crop&w=600", avisos: ["Zona tranquila para jugar"] }
        ];

        // CONFIGURACIÓN DEL MAPA (Leaflet)
        let map;
        function initMap() {
            map = L.map('map').setView([27.575, -109.940], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            const redIcon = L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
            });

            canchas.forEach(c => {
                const latlng = c.coords.split(',').map(Number);
                L.marker(latlng, {icon: redIcon}).addTo(map).bindPopup(`<b>${c.nombre}</b><br>${c.sector}`);
            });
        }

        // RENDERIZADO DE TARJETAS
        function render(filter = 'all') {
            const grid = document.getElementById('courts-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? canchas : canchas.filter(c => c.sector === filter);

            filtered.forEach(c => {
                let avisosHTML = '';
                if (c.avisos.length > 0) {
                    c.avisos.forEach(aviso => { avisosHTML += `<div class="comment">${aviso}</div>`; });
                } else { avisosHTML = `<div style="font-size:0.8rem; color:#aaa;">Sin avisos recientes.</div>`; }

                grid.innerHTML += `
                    <div class="card">
                        <div class="card-img" style="background-image: url('${c.img}')"></div>
                        <div class="card-content">
                            <div class="zona-tag">📍 ${c.sector}</div>
                            <h3>${c.nombre}</h3>
                            <a href="https://www.google.com/maps?q=${c.coords}" target="_blank" class="btn-maps">VER EN MAPA</a>
                        </div>
                        <div class="comments-section">
                            <strong>Avisos de JFSTUDIOMX:</strong>
                            <div style="margin-top:10px;">${avisosHTML}</div>
                        </div>
                    </div>
                `;
            });
        }

        // CONTROL DE FILTROS
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                e.target.classList.add('active');
                render(e.target.dataset.filter);
            });
        });

        // INICIAR AL CARGAR LA PÁGINA
        window.onload = function() {
            render();
            initMap();
        };
    </script>
</body>
</html>
